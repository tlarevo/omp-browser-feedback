name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build:omp-extension
      - run: bun run build:extension
      - run: bun test test/prepare-release-package.test.ts test/standalone-omp-package-smoke.test.ts
        env:
          SKIP_OMP_SMOKE: "1"
      - run: bun run check
      - run: bun run test
        env:
          SKIP_CHROME_E2E: "1"
          SKIP_OMP_SMOKE: "1"
