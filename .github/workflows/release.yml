name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - name: Verify tag matches release package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/browser-omp-extension/package.json').version")"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::browser-omp-extension version $PKG does not match tag $GITHUB_REF_NAME"
            exit 1
          fi
      - run: bun run check
      - run: bun run test
        env:
          SKIP_CHROME_E2E: "1"
      - run: bun run build:omp-extension
      - run: bun test test/prepare-release-package.test.ts test/standalone-omp-package-smoke.test.ts
      - run: bun scripts/prepare-release-package.ts packages/browser-omp-extension .release/browser-omp-extension
      - run: npm publish --access public --provenance
        working-directory: .release/browser-omp-extension
