<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>OMP Browser Feedback</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
					sans-serif;
				font-size: 14px;
				line-height: 1.4;
				color: #1a1a1a;
				background: #fff;
				min-width: 320px;
				max-width: 400px;
			}

			#app {
				padding: 12px;
			}

			/* ── Live region (visually hidden, screen-reader only) ── */
			.sr-only {
				position: absolute;
				width: 1px;
				height: 1px;
				padding: 0;
				margin: -1px;
				overflow: hidden;
				clip: rect(0, 0, 0, 0);
				white-space: nowrap;
				border: 0;
			}

			/* ── Loading spinner ── */
			.loading {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 16px 0;
			}
			.spinner {
				width: 18px;
				height: 18px;
				border: 2px solid #e0e0e0;
				border-top-color: #4caf50;
				border-radius: 50%;
				animation: spin 0.6s linear infinite;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			/* ── Status messages ── */
			.status {
				padding: 8px 0;
				color: #555;
			}
			.status.error {
				color: #c62828;
			}

			/* ── Session cards ── */
			.session-list {
				list-style: none;
				display: flex;
				flex-direction: column;
				gap: 6px;
				margin: 8px 0;
			}
			.session-card {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 10px 12px;
				border: 2px solid #e0e0e0;
				border-radius: 8px;
				cursor: pointer;
				transition: border-color 0.15s;
				background: #fafafa;
			}
			.session-card:hover {
				border-color: #bbb;
			}
			.session-card.selected {
				border-color: #4caf50;
				background: #f1f8e9;
			}
			.session-card:focus-visible {
				outline: 2px solid #1976d2;
				outline-offset: 2px;
			}
			.session-card-info {
				flex: 1;
				min-width: 0;
			}
			.session-card-name {
				font-weight: 600;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.session-card-meta {
				font-size: 12px;
				color: #777;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.presence-dot {
				width: 10px;
				height: 10px;
				border-radius: 50%;
				flex-shrink: 0;
			}
			.presence-active {
				background: #4caf50;
			}
			.presence-idle {
				background: #ff9800;
			}
			.presence-disconnected {
				background: #9e9e9e;
			}

			/* ── Form elements ── */
			input[type="text"],
			textarea {
				width: 100%;
				padding: 8px;
				border: 1px solid #ccc;
				border-radius: 4px;
				font-size: 14px;
				font-family: inherit;
			}
			input[type="text"]:focus-visible,
			textarea:focus-visible {
				outline: 2px solid #1976d2;
				outline-offset: 1px;
			}
			textarea {
				resize: vertical;
				min-height: 48px;
			}

			button {
				padding: 8px 16px;
				border: 1px solid #ccc;
				border-radius: 4px;
				background: #fff;
				font-size: 14px;
				font-family: inherit;
				cursor: pointer;
				transition: background 0.15s;
			}
			button:hover {
				background: #f5f5f5;
			}
			button:focus-visible {
				outline: 2px solid #1976d2;
				outline-offset: 2px;
			}
			button.primary {
				background: #4caf50;
				color: #fff;
				border-color: #4caf50;
			}
			button.primary:hover {
				background: #43a047;
			}
			button.primary:disabled {
				background: #a5d6a7;
				border-color: #a5d6a7;
				cursor: not-allowed;
			}
			button.danger {
				color: #c62828;
				border-color: #c62828;
			}
			button.danger:hover {
				background: #ffebee;
			}
			button.link {
				padding: 0;
				border: none;
				background: none;
				color: #1976d2;
				text-decoration: underline;
				cursor: pointer;
				font-size: 13px;
			}
			button.link:hover {
				color: #1565c0;
			}

			/* ── Toolbar ── */
			.toolbar {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 8px;
			}
			.toolbar-title {
				font-weight: 600;
				font-size: 13px;
				color: #555;
			}

			/* ── Footer ── */
			.footer {
				margin-top: 12px;
				padding-top: 8px;
				border-top: 1px solid #eee;
				display: flex;
				flex-direction: column;
				gap: 4px;
			}

			/* ── Zoom-safe ── */
			@media (min-width: 500px) {
				body {
					font-size: 16px;
				}
			}
		</style>
	</head>
	<body>
		<div
			id="status-announcer"
			class="sr-only"
			aria-live="polite"
			aria-atomic="true"
			role="status"
		></div>
		<main id="app" aria-label="OMP Browser Feedback"></main>
		<script src="../../dist/popup/app.js"></script>
	</body>
</html>
